name: Deploy Laravel to Hostinger VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      VPS_HOST: 187.77.173.160
      VPS_USER: root
      VPS_PORT: 22
      DEPLOY_PATH: /var/www/attendance-laravel

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${VPS_PORT} -H ${VPS_HOST} >> ~/.ssh/known_hosts

      - name: Ensure deploy directory exists on VPS
        run: |
          ssh -p ${VPS_PORT} ${VPS_USER}@${VPS_HOST} "mkdir -p ${DEPLOY_PATH}"

      - name: Sync project files to VPS
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.env' \
            --exclude='vendor' \
            --exclude='node_modules' \
            --exclude='storage/framework/cache/*' \
            --exclude='storage/framework/sessions/*' \
            --exclude='storage/framework/views/*' \
            --exclude='storage/logs/*' \
            ./ ${VPS_USER}@${VPS_HOST}:${DEPLOY_PATH}/

      - name: Run Laravel deploy commands on VPS
        run: |
          ssh -p ${VPS_PORT} ${VPS_USER}@${VPS_HOST} << 'EOF'
          set -e
          cd /var/www/attendance-laravel

          if [ ! -f .env ]; then
            cp .env.example .env
          fi

          if command -v composer >/dev/null 2>&1; then
            composer install --no-interaction --prefer-dist --no-dev --optimize-autoloader
          else
            echo "Composer is not installed on VPS" >&2
            exit 1
          fi

          php artisan key:generate --force || true
          php artisan migrate --force
          php artisan storage:link || true
          php artisan optimize:clear
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache

          chown -R www-data:www-data storage bootstrap/cache || true
          chmod -R ug+rwx storage bootstrap/cache || true
          EOF
