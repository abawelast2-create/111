name: Deploy Laravel to Hostinger VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      VPS_HOST: 187.77.173.160
      VPS_USER: root
      VPS_PORT: 22
      DEPLOY_PATH: /var/www/attendance-laravel

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${VPS_PORT} -H ${VPS_HOST} >> ~/.ssh/known_hosts

      - name: Mark deploy scripts as executable
        run: |
          chmod +x scripts/vps/post-deploy.sh
          chmod +x scripts/vps/bootstrap-ubuntu-24-laravel.sh

      - name: Ensure deploy directory exists on VPS
        run: |
          ssh -p ${VPS_PORT} ${VPS_USER}@${VPS_HOST} "mkdir -p ${DEPLOY_PATH}"

      - name: Sync project files to VPS
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.env' \
            --exclude='vendor' \
            --exclude='node_modules' \
            --exclude='storage/framework/cache/*' \
            --exclude='storage/framework/sessions/*' \
            --exclude='storage/framework/views/*' \
            --exclude='storage/logs/*' \
            ./ ${VPS_USER}@${VPS_HOST}:${DEPLOY_PATH}/

      - name: Run Laravel deploy commands on VPS
        run: |
          ssh -p ${VPS_PORT} ${VPS_USER}@${VPS_HOST} << 'EOF'
          set -e
          cd /var/www/attendance-laravel
          chmod +x scripts/vps/post-deploy.sh
          ./scripts/vps/post-deploy.sh /var/www/attendance-laravel
          EOF
